<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tripoly — Live Confirmations</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&family=Nunito:wght@700;800&display=swap"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f0f2f7;--surface:#fff;--border:#e2e6ef;--text:#111827;--muted:#6b7a99;--green:#16cf76;--green-bg:#eaf8f1;--green-txt:#0a7a46;--blue:#185FA5;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;overflow:hidden;}
.layout{display:flex;flex-direction:column;height:100vh;padding:12px 16px 10px;gap:10px;}
.header{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#111827 0%,#1e3a5f 50%,#0a7a46 100%);border-radius:14px;padding:12px 24px;flex-shrink:0;}
.brand-name{font-family:'Nunito',sans-serif;font-size:26px;font-weight:800;color:#fff;letter-spacing:-0.5px;}
.header-center{display:flex;flex-direction:column;align-items:center;gap:5px;}
.header-sub{font-size:12px;color:rgba(255,255,255,0.7);}
.live-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(22,207,118,0.2);color:#16cf76;border:1px solid rgba(22,207,118,0.4);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:600;letter-spacing:1.5px;}
.live-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.header-right{display:flex;align-items:center;gap:14px;}
.refresh-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:8px 16px;font-size:13px;font-weight:500;color:#fff;cursor:pointer;font-family:'Inter',sans-serif;}
.refresh-btn:hover{background:rgba(255,255,255,0.2);}
.clock-block{text-align:right;}
.clock{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:#fff;line-height:1;}
.date-str{font-size:11px;color:rgba(255,255,255,0.6);margin-top:2px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;flex-shrink:0;}
.stat-card{border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;}
.stat-card:nth-child(1){background:linear-gradient(135deg,#0a7a46,#16cf76);color:#fff;}
.stat-card:nth-child(2){background:linear-gradient(135deg,#185FA5,#378ADD);color:#fff;}
.stat-card:nth-child(3){background:linear-gradient(135deg,#b87d00,#EF9F27);color:#fff;}
.stat-card:nth-child(4){background:linear-gradient(135deg,#3C3489,#7F77DD);color:#fff;}
.stat-icon{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.stat-label{font-size:11px;opacity:0.85;text-transform:uppercase;letter-spacing:0.8px;font-weight:500;}
.stat-value{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;line-height:1.1;margin-top:2px;}
.table-head{display:grid;grid-template-columns:48px 190px 1fr 1fr 80px 100px 110px;padding:6px 16px;flex-shrink:0;}
.th{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;}
.th.right{text-align:right;}
.feed{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-right:4px;}
.feed::-webkit-scrollbar{width:4px;}
.feed::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.row{display:grid;grid-template-columns:48px 190px 1fr 1fr 80px 100px 110px;align-items:center;background:var(--surface);border:1px solid var(--border);border-left:4px solid transparent;border-radius:12px;padding:10px 16px;}
.row.is-new{animation:rowSlide 0.4s ease-out;}
@keyframes rowSlide{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.av-fallback{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;font-family:'Space Grotesk',sans-serif;border:2px solid transparent;flex-shrink:0;}
.cell{padding:0 10px;min-width:0;}
.c-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-dest{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-amount{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--blue);white-space:nowrap;}
.c-pax,.c-tdate{font-size:12px;color:var(--muted);white-space:nowrap;}
.c-time{text-align:right;}
.c-time-main{font-size:13px;font-weight:500;}
.c-time-date{font-size:11px;color:var(--muted);margin-top:1px;}
.new-tag{display:inline-block;background:var(--green-bg);color:var(--green-txt);font-size:9px;font-weight:700;letter-spacing:1px;padding:1px 7px;border-radius:20px;text-transform:uppercase;}
.git-tag{display:inline-block;background:#e8f1fb;color:#185FA5;font-size:9px;font-weight:700;letter-spacing:1px;padding:1px 7px;border-radius:20px;margin-left:4px;text-transform:uppercase;}
.state-box{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);font-size:14px;}
.state-box .s-icon{font-size:40px;}
.footer{display:flex;align-items:center;justify-content:space-between;padding:6px 4px 0;border-top:1px solid var(--border);flex-shrink:0;}
.footer-left{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);}
.spinner{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;display:none;}
.spinner.on{display:block;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="layout">
  <div class="header">
    <div><span class="brand-name">tripoly</span></div>
    <div class="header-center">
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <div class="header-sub">Live Booking Confirmations — Current Month</div>
    </div>
    <div class="header-right">
      <button class="refresh-btn" id="refreshBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
          <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
        </svg>
        Refresh
      </button>
      <div class="clock-block">
        <div class="clock" id="clock">--:--</div>
        <div class="date-str" id="dateStr">--</div>
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-icon">🗓️</div><div><div class="stat-label">Confirmations</div><div class="stat-value" id="sTotal">—</div></div></div>
    <div class="stat-card"><div class="stat-icon">💰</div><div><div class="stat-label">Total Value</div><div class="stat-value" id="sValue">—</div></div></div>
    <div class="stat-card"><div class="stat-icon">👥</div><div><div class="stat-label">Total Pax</div><div class="stat-value" id="sPax">—</div></div></div>
    <div class="stat-card"><div class="stat-icon">🔄</div><div><div class="stat-label">Last Refreshed</div><div class="stat-value" id="sRefresh">—</div></div></div>
  </div>

  <div class="table-head">
    <span class="th"></span>
    <span class="th">Salesperson</span>
    <span class="th">Destination</span>
    <span class="th">Booking Value</span>
    <span class="th">Pax</span>
    <span class="th">Travel Date</span>
    <span class="th right">Confirmed At</span>
  </div>

  <div class="feed" id="feed">
    <div class="state-box"><div class="s-icon">⏳</div><div>Loading confirmations...</div></div>
  </div>

  <div class="footer">
    <div class="footer-left">
      <div class="spinner" id="spinner"></div>
      <span id="footerMsg">Connecting...</span>
    </div>
    <div style="font-size:11px;color:var(--muted);" id="nextRefresh"></div>
  </div>
</div>

<script>
const PROXY = 'https://tripoly-proxy.onrender.com/api/confirmations';
const AUTO_MS = 5 * 60 * 1000;

const AV_COLOURS = [
  {bg:'#E1F5EE',txt:'#0F6E56',border:'#0F6E56'},
  {bg:'#E6F1FB',txt:'#185FA5',border:'#185FA5'},
  {bg:'#FAEEDA',txt:'#854F0B',border:'#854F0B'},
  {bg:'#FBEAF0',txt:'#993556',border:'#993556'},
  {bg:'#EEEDFE',txt:'#3C3489',border:'#3C3489'},
  {bg:'#E0F7FA',txt:'#00695C',border:'#00695C'},
  {bg:'#FFF3E0',txt:'#E65100',border:'#E65100'},
];

let knownIds = new Set();
let firstLoad = true;
let colourMap = {};
let colourIdx = 0;
let countdownId = null;
let countdown = AUTO_MS / 1000;

// Clock
function tickClock() {
  const n = new Date();
  document.getElementById('clock').textContent = n.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true});
  document.getElementById('dateStr').textContent = n.toLocaleDateString('en-IN', {weekday:'long', day:'numeric', month:'long'});
}
setInterval(tickClock, 1000);
tickClock();

// Countdown
function startCountdown() {
  clearInterval(countdownId);
  countdown = AUTO_MS / 1000;
  countdownId = setInterval(function() {
    countdown--;
    var m = Math.floor(countdown / 60);
    var s = countdown % 60;
    document.getElementById('nextRefresh').textContent = 'Auto-refresh in ' + m + ':' + String(s).padStart(2, '0');
    if (countdown <= 0) { clearInterval(countdownId); fetchData(); }
  }, 1000);
}

// Refresh button
document.getElementById('refreshBtn').addEventListener('click', function() {
  fetchData();
});

// Helpers
function fmtAmt(v) { return Number(v).toLocaleString('en-IN', {maximumFractionDigits:0}); }
function fmtDate(s) {
  if (!s) return '—';
  var d = new Date(s);
  return isNaN(d) ? s : d.toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'2-digit'});
}
function fmtTime(s) {
  if (!s) return {time:'—', when:''};
  var d = new Date(s);
  if (isNaN(d)) return {time:s, when:''};
  var time = d.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', hour12:true});
  var today = new Date();
  var when = d.toDateString() === today.toDateString() ? 'Today' : d.toLocaleDateString('en-IN', {day:'numeric', month:'short'});
  return {time:time, when:when};
}
function initials(name) { return (name||'?').split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2); }
function colourFor(id) {
  if (!colourMap[id]) { colourMap[id] = AV_COLOURS[colourIdx % AV_COLOURS.length]; colourIdx++; }
  return colourMap[id];
}
function monthRange() {
  var n = new Date();
  var s = new Date(n.getFullYear(), n.getMonth(), 1);
  var e = new Date(n.getFullYear(), n.getMonth()+1, 0, 23, 59, 59);
  return {s:s, e:e};
}
function isGIT(rec) {
  var layout = rec['Layout'];
  if (!layout) return false;
  return (layout.name || layout.Name || '').toString().toUpperCase().includes('GIT');
}

function renderRow(rec, isNew) {
  var git = isGIT(rec);
  var dest_field = git ? 'Group_Depature' : 'Cities_to_be_covered';
  var owner = rec['Owner'] || {};
  var name = owner.name || '—';
  var destRaw = rec[dest_field];
  var dest = (destRaw && typeof destRaw === 'object' ? destRaw.name : destRaw) || '—';
  var amount = rec['Quote_Value'];
  var pax = rec['Total_Passanger_Travelling'] || '—';
  var td = fmtDate(rec['Travel_Date']);
  var ct = fmtTime(rec['Created_Time']);
  var col = colourFor(owner.id || name);
  var ini = initials(name);

  return '<div class="row' + (isNew ? ' is-new' : '') + '" style="border-left-color:' + col.border + '">' +
    '<div class="av-fallback" style="background:' + col.bg + ';color:' + col.txt + ';border:2px solid ' + col.border + '">' + ini + '</div>' +
    '<div class="cell"><div class="c-name" style="color:' + col.txt + '">' + name + '</div>' +
    '<div>' + (isNew ? '<span class="new-tag">New</span>' : '') + (git ? '<span class="git-tag">GIT</span>' : '') + '</div></div>' +
    '<div class="cell"><div class="c-dest">📍 ' + dest + '</div></div>' +
    '<div class="cell"><div class="c-amount">₹' + (amount ? fmtAmt(amount) : '—') + '</div></div>' +
    '<div class="cell"><div class="c-pax">👥 ' + pax + '</div></div>' +
    '<div class="cell"><div class="c-tdate">✈️ ' + td + '</div></div>' +
    '<div class="cell c-time"><div class="c-time-main">' + ct.time + '</div><div class="c-time-date">' + ct.when + '</div></div>' +
    '</div>';
}

function fetchData() {
  var spin = document.getElementById('spinner');
  var msg = document.getElementById('footerMsg');
  spin.classList.add('on');
  msg.textContent = 'Refreshing...';

  fetch(PROXY)
    .then(function(res) { return res.json(); })
    .then(function(json) {
      var recs = json.data || [];
      var range = monthRange();

      var filtered = recs.filter(function(r) {
        var ct = r['Created_Time'];
        if (!ct) return false;
        var d = new Date(ct);
        if (d < range.s || d > range.e) return false;
        if (isGIT(r)) {
          var destRaw = r['Group_Depature'];
          var dest = destRaw && typeof destRaw === 'object' ? destRaw.name : destRaw;
          return dest && dest.toString().trim() !== '';
        } else {
          var tos = (r['Type_of_Service'] || '').toString().trim();
          return tos === 'International Holiday Package' || tos === 'Domestic Holiday Package';
        }
      });

      var newIds = filtered.filter(function(r) { return !knownIds.has(r.id); }).map(function(r) { return r.id; });
      var totAmt = filtered.reduce(function(a, r) { return a + (Number(r['Quote_Value']) || 0); }, 0);
      var totPax = filtered.reduce(function(a, r) { return a + (Number(r['Total_Passanger_Travelling']) || 0); }, 0);

      document.getElementById('sTotal').textContent = filtered.length || '—';
      document.getElementById('sValue').textContent = filtered.length ? '₹' + fmtAmt(totAmt) : '—';
      document.getElementById('sPax').textContent = totPax || '—';
      document.getElementById('sRefresh').textContent = new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', hour12:true});

      var feed = document.getElementById('feed');
      feed.innerHTML = filtered.length
        ? filtered.map(function(r) { return renderRow(r, newIds.indexOf(r.id) >= 0); }).join('')
        : '<div class="state-box"><div class="s-icon">📭</div><div>No confirmations this month yet.</div></div>';

      filtered.forEach(function(r) { knownIds.add(r.id); });
      firstLoad = false;
      msg.textContent = 'Showing ' + filtered.length + ' confirmation' + (filtered.length !== 1 ? 's' : '') + ' this month';
    })
    .catch(function(err) {
      document.getElementById('feed').innerHTML = '<div class="state-box"><div class="s-icon">⚠️</div><div>Error: ' + err.message + '</div></div>';
      msg.textContent = 'Error connecting to proxy';
      console.error(err);
    })
    .finally(function() {
      spin.classList.remove('on');
      startCountdown();
    });
}

fetchData();
</script>
</body>
</html>
