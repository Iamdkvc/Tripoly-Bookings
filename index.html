:10px;padding:8px 16px;font-size:13px;font-weight:500;color:#ffffff;cursor:pointer;font-family:'Inter',sans-serif;transition:background 0.15s;}.refresh-btn:hover{background:rgba(255,255,255,0.2);}.refresh-btn:active{transform:scale(0.98);}.refresh-btn svg{width:15px;height:15px;stroke:rgba(255,255,255,0.8);}.refresh-btn.spinning svg{animation:spinOnce 0.6s linear;}@keyframes spinOnce{to{transform:rotate(360deg);}}.clock-block{text-align:right;}.clock{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:#ffffff;line-height:1;}.date-str{font-size:11px;color:rgba(255,255,255,0.6);margin-top:2px;}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;flex-shrink:0;}.stat-card{border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;}.stat-card:nth-child(1){background:linear-gradient(135deg,#0a7a46,#16cf76);color:#fff;}.stat-card:nth-child(2){background:linear-gradient(135deg,#185FA5,#378ADD);color:#fff;}.stat-card:nth-child(3){background:linear-gradient(135deg,#b87d00,#EF9F27);color:#fff;}.stat-card:nth-child(4){background:linear-gradient(135deg,#3C3489,#7F77DD);color:#fff;}.stat-icon{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}.stat-card:nth-child(4) .stat-icon{background:rgba(255,255,255,0.2);}.stat-label{font-size:11px;opacity:0.85;text-transform:uppercase;letter-spacing:0.8px;font-weight:500;}.stat-card:nth-child(4) .stat-label{opacity:0.85;}.stat-value{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;line-height:1.1;margin-top:2px;}.stat-card:nth-child(4) .stat-value{font-size:15px;}.table-head{display:grid;grid-template-columns:48px 190px 1fr 1fr 80px 100px 110px;padding:6px 16px;flex-shrink:0;}.th{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;}.th.right{text-align:right;}.feed{flex:1;overflow-y:auto;display:flex;flex-direction ext-transform:uppercase;}.state-box{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);font-size:14px;}.state-box .s-icon{font-size:40px;}.footer{display:flex;align-items:center;justify-content:space-between;padding:6px 4px 0;border-top:1px solid var(--border);flex-shrink:0;}.footer-left{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);}.spinner{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;display:none;}.spinner.on{display:block;}@keyframes spin{to{transform:rotate(360deg);}}#cel-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.3s;}#cel-overlay.show{opacity:1;}.cel-card{background:linear-gradient(135deg,#0a7a46,#16cf76);border-radius:24px;padding:40px 64px;text-align:center;transform:scale(0.85);transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 24px 60px rgba(0,0,0,0.3);}#cel-overlay.show .cel-card{transform:scale(1);}.cel-avatar{width:80px;height:80px;border-radius:50%;margin:0 auto 16px;border:4px solid rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:#fff;}.cel-emoji{font-size:48px;margin-bottom:8px;}.cel-title{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;color:#ffffff;margin-bottom:6px;}.cel-sub{font-size:18px;color:rgba(255,255,255,0.85);}.cel-amount{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;color:#ffffff;margin-top:10px;}.cel-timer{font-size:12px;color:rgba(255,255,255,0.6);margin-top:8px;}.confetti-p{position:fixed;pointer-events:none;z-index:101;border-radius:2px;animation:fall linear forwards;}@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}</style></head>< ravelDate : 'Travel_Date', amount : 'Quote_Value', owner : 'Owner', createdTime : 'Created_Time', layout : 'Layout',};const GIT_LAYOUT_NAME = 'GIT';const AV_COLOURS = [ {bg:'#E1F5EE',txt:'#0F6E56',border:'#0F6E56'}, {bg:'#E6F1FB',txt:'#185FA5',border:'#185FA5'}, {bg:'#FAEEDA',txt:'#854F0B',border:'#854F0B'}, {bg:'#FBEAF0',txt:'#993556',border:'#993556'}, {bg:'#EEEDFE',txt:'#3C3489',border:'#3C3489'}, {bg:'#FAF0E6',txt:'#8B4513',border:'#8B4513'}, {bg:'#E0F7FA',txt:'#00695C',border:'#00695C'}, {bg:'#FFF3E0',txt:'#E65100',border:'#E65100'},];let knownIds = new Set();let firstLoad = true;let picCache = {};let colourMap = {};let colourIdx = 0;let countdownId = null;let countdown = CFG.autoRefreshMs / 1000;let celTimerId = null;let celCountdown = 45;function tickClock() { const n = new Date(); document.getElementById('clock').textContent = n.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true}); document.getElementById('dateStr').textContent = n.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});}setInterval(tickClock,1000);tickClock();function startCountdown() { clearInterval(countdownId); countdown = CFG.autoRefreshMs / 1000; countdownId = setInterval(() => { countdown--; const m = Math.floor(countdown/60); const s = countdown%60; document.getElementById('nextRefresh').textContent = `Auto-refresh in ${m}:${String(s).padStart(2,'0')}`; if(countdown<=0){clearInterval(countdownId);fetchData();} },1000);}async function refreshAccessToken() { try { const params = new URLSearchParams({ refresh_token : CFG.refreshToken, client_id : CFG.clientId, client_secret : CFG.clientSecret, grant_type : 'refresh_token', }); const res = await fetch(CFG.authBase, {method:'POST', body:params}); const json = await res.json(); if(json.access_token) { CFG.accessToken = json.access_token; console.log('Token refreshed at', new Date().toLocaleTimeString()); } } catch(e) { console.warn('Token refresh failed:', e); }}setInterval(refreshAccessToken, CFG.tokenRefreshMs);function triggerRefresh() { const btn = document.getElementById('refreshBtn'); btn.classList.add('spinning'); setTimeout(()=>btn.classList.remove('spinning'),600); fetchData();}function playSound() { const audio = document.getElementById('celebrationAudio'); audio.currentTime = 0; audio.play().catch(e=>console.warn('Audio blocked:',e));}function stopSound() { const audio = document.getElementById('celebrationAudio'); audio.pause(); audio.currentTime = 0;}function confetti() { const cols = ['#16cf76','#185FA5','#FDC645','#f472b6','#a78bfa','#ffffff','#ff6b35','#00d2ff']; for(let i=0;i<80;i++){ const el = document.createElement('div'); el.className = 'confetti-p'; const size = 6+Math.random()*9; el.style.cssText = `left:${Math.random()*100}vw;top:-10px;width:${size}px;height:${size}px; background:${cols[Math.floor(Math.random()*cols.length)]}; border-radius:${Math.random()>.5?'50%':'2px'}; animation-duration:${2+Math.random()*2.5}s; animation-delay:${Math.random()*0.5}s;`; document.body.appendChild(el); el.addEventListener('animationend',()=>el.remove()); }}function celebrate(ownerName, dest, amount, pic, colour) { const avEl = document.getElementById('celAvatar'); const ini = initials(ownerName); avEl.style.background = colour ? colour.bg : '#16cf76'; avEl.style.color = colour ? colour.txt : '#fff'; avEl.textContent = ini; document.getElementById('celTitle').textContent = `🎉 ${ownerName} just confirmed!`; document.getElementById('celSub').textContent = dest || ''; document.getElementById('celAmount').textContent = amount ? '₹'+fmtAmt(amount) : ''; const ov = document.getElementById('cel-overlay'); ov.classList.add('show'); playSound(); const confettiTimes = [0,3000,6000,9500,13000,16500,20000,23500,27000,30500,34000,38000,42000]; confettiTimes.forEach(t => { if(t === 0) confetti(); else setTimeout(confetti, t); }); if(celTimerId) clearInterval(celTimerId); celCountdown = 45; document.getElementById('celTimer').textContent = `Closing in ${celCountdown}s`; celTimerId = setInterval(()=>{ celCountdown--; document.getElementById('celTimer').textContent = `Closing in ${celCountdown}s`; if(celCountdown<=0){ clearInterval(celTimerId); ov.classList.remove('show'); stopSound(); } },1000);}function fmtAmt(v){return Number(v).toLocaleString('en-IN',{maximumFractionDigits:0});}function fmtDate(s){if(!s)return'—';const d=new Date(s);return isNaN(d)?s:d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'2-digit'});}function fmtTime(s){ if(!s)return{time:'—',when:''}; const d=new Date(s);if(isNaN(d))return{time:s,when:''}; const time=d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true}); const today=new Date(); const when=d.toDateString()===today.toDateString()?'Today':d.toLocaleDateString('en-IN',{day:'numeric',month:'short'}); return{time,when};}function initials(name){return(name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}function colourFor(id){ if(!colourMap[id]){colourMap[id]=AV_COLOURS[colourIdx%AV_COLOURS.length];colourIdx++;} return colourMap[id];}function monthRange(){ const n=new Date(); const s=new Date(n.getFullYear(),n.getMonth(),1); const e=new Date(n.getFullYear(),n.getMonth()+1,0,23,59,59); const iso=d=>d.toISOString().slice(0,19); return{s:iso(s),e:iso(e)};}function isGIT(rec){ const layout = rec['Layout']; if(!layout) return false; const name = (layout.name||layout.Name||'').toString().toUpperCase(); return name.includes('GIT');}async function fetchPic(userId){ if(!userId||picCache[userId]!==undefined)return picCache[userId]||null; try{ const r=await fetch(`${CFG.apiBase}/users/${userId}/photo`,{ headers:{ Authorization:`Zoho-oauthtoken ${CFG.accessToken}`, 'X-CRM-ORG':CFG.orgId, 'Accept':'image/*' } }); if(r.ok){ const blob=await r.blob(); if(blob.size>0){ const url=URL.createObjectURL(blob); picCache[userId]=url; return url; } } }catch(e){console.warn('Photo fetch failed for',userId,e);} picCache[userId]=null;return null;}function renderRow(r
