<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tripoly — Live Confirmations</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&family=Nunito:wght@700;800&display=swap"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f0f2f7;--surface:#fff;--border:#e2e6ef;--text:#111827;--muted:#6b7a99;--green:#16cf76;--green-bg:#eaf8f1;--green-txt:#0a7a46;--blue:#185FA5;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;overflow:hidden;}
#page-wrapper{position:relative;width:100vw;height:100vh;overflow:hidden;}
.layout{display:flex;flex-direction:column;height:100vh;padding:14px 18px 12px;gap:12px;}
.header{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#111827 0%,#1e3a5f 50%,#0a7a46 100%);border-radius:16px;padding:20px 32px;flex-shrink:0;min-height:90px;}
.logo-img{height:48px;width:auto;display:block;}
.header-center{display:flex;flex-direction:column;align-items:center;gap:6px;}
.header-sub{font-size:13px;color:rgba(255,255,255,0.7);}
.live-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(22,207,118,0.2);color:#16cf76;border:1px solid rgba(22,207,118,0.4);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:600;letter-spacing:1.5px;}
.live-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.header-right{display:flex;align-items:center;gap:28px;}
.refresh-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:10px 18px;font-size:14px;font-weight:500;color:#fff;cursor:pointer;font-family:'Inter',sans-serif;}
.refresh-btn:hover{background:rgba(255,255,255,0.2);}
.clock-block{text-align:right;}
.clock{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:#fff;line-height:1;}
.date-str{font-size:11px;color:rgba(255,255,255,0.6);margin-top:3px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;flex-shrink:0;}
.stat-card{border-radius:14px;padding:20px 24px;display:flex;align-items:center;gap:20px;min-height:100px;}
.stat-card:nth-child(1){background:linear-gradient(135deg,#0a7a46,#16cf76);color:#fff;}
.stat-card:nth-child(2){background:linear-gradient(135deg,#185FA5,#378ADD);color:#fff;}
.stat-card:nth-child(3){background:linear-gradient(135deg,#b87d00,#EF9F27);color:#fff;}
.stat-card:nth-child(4){background:linear-gradient(135deg,#3C3489,#7F77DD);color:#fff;}
.stat-icon{width:52px;height:52px;border-radius:12px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.stat-text{padding-left:4px;}
.stat-label{font-size:12px;opacity:0.85;text-transform:uppercase;letter-spacing:0.8px;font-weight:500;}
.stat-value{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;line-height:1.1;margin-top:6px;}
.table-head{display:grid;grid-template-columns:56px 200px 1fr 1fr 90px 110px 120px;padding:10px 20px;flex-shrink:0;}
.th{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;}
.th.right{text-align:right;}
.feed{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-right:4px;}
.feed::-webkit-scrollbar{width:4px;}
.feed::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.row{display:grid;grid-template-columns:56px 200px 1fr 1fr 90px 110px 120px;align-items:center;background:var(--surface);border:1px solid var(--border);border-left:5px solid transparent;border-radius:14px;padding:14px 20px;min-height:72px;}
.row.is-new{animation:rowSlide 0.4s ease-out;}
@keyframes rowSlide{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.av-fallback{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;font-family:'Space Grotesk',sans-serif;border:2px solid transparent;flex-shrink:0;}
.cell{padding:0 12px;min-width:0;}
.c-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-dest{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.c-amount{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:var(--blue);white-space:nowrap;}
.c-pax,.c-tdate{font-size:13px;color:var(--muted);white-space:nowrap;}
.c-time{text-align:right;}
.c-time-main{font-size:14px;font-weight:500;}
.c-time-date{font-size:12px;color:var(--muted);margin-top:2px;}
.new-tag{display:inline-block;background:var(--green-bg);color:var(--green-txt);font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:20px;text-transform:uppercase;}
.git-tag{display:inline-block;background:#e8f1fb;color:#185FA5;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:20px;margin-left:4px;text-transform:uppercase;}
.state-box{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);font-size:14px;}
.state-box .s-icon{font-size:40px;}
.footer{display:flex;align-items:center;justify-content:space-between;padding:8px 4px 0;border-top:1px solid var(--border);flex-shrink:0;}
.footer-left{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);}
.spinner{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;display:none;}
.spinner.on{display:block;}
@keyframes spin{to{transform:rotate(360deg);}}
.test-btn{background:#185FA5;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;}
.test-btn:hover{background:#1470b8;}
#cel-overlay{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:150;}
#cel-overlay.show{display:block;}
.cel-inner{width:100%;height:100%;display:table;}
.cel-middle{display:table-cell;vertical-align:middle;text-align:center;}
.cel-card{display:inline-block;background:linear-gradient(135deg,#0a7a46,#16cf76);border-radius:24px;padding:48px 80px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,0.4);min-width:400px;}
.cel-avatar{width:90px;height:90px;border-radius:50%;margin:0 auto 20px;border:4px solid rgba(255,255,255,0.5);font-size:32px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:#fff;background:#0a7a46;line-height:90px;text-align:center;}
.cel-title{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;color:#fff;margin-bottom:8px;}
.cel-sub{font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;color:rgba(255,255,255,0.85);margin-top:6px;}
.cel-amount{font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;color:#fff;margin-top:12px;}
.cel-timer{font-size:13px;color:rgba(255,255,255,0.7);margin-top:12px;}
.confetti-p{position:absolute;pointer-events:none;z-index:160;border-radius:2px;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
</head>

var PROXY = 'https://tripoly-proxy.onrender.com/api/confirmations';
var AUTO_MS = 5 * 60 * 1000;
var AV_COLOURS = [
  {bg:'#E1F5EE',txt:'#0F6E56',border:'#0F6E56'},
  {bg:'#E6F1FB',txt:'#185FA5',border:'#185FA5'},
  {bg:'#FAEEDA',txt:'#854F0B',border:'#854F0B'},
  {bg:'#FBEAF0',txt:'#993556',border:'#993556'},
  {bg:'#EEEDFE',txt:'#3C3489',border:'#3C3489'},
  {bg:'#E0F7FA',txt:'#00695C',border:'#00695C'},
  {bg:'#FFF3E0',txt:'#E65100',border:'#E65100'},
];
var knownIds = new Set();
var firstLoad = true;
var colourMap = {};
var colourIdx = 0;
var countdownId = null;
var countdown = AUTO_MS / 1000;
var celTimerId = null;
var celCountdown = 45;
var soundPrimed = false;

// Auto-prime audio on page load using muted autoplay
function primeAudio() {
  if (soundPrimed) return;
  var audio = document.getElementById('celebAudio');
  audio.muted = true;
  audio.play().then(function() {
    audio.pause();
    audio.currentTime = 0;
    audio.muted = false;
    soundPrimed = true;
  }).catch(function() {
    soundPrimed = true;
  });
}

function playSound() {
  try {
    var audio = document.getElementById('celebAudio');
    audio.muted = false;
    audio.currentTime = 0;
    audio.volume = 1;
    audio.play();
  } catch(e) {}
}

function stopSound() {
  try {
    var audio = document.getElementById('celebAudio');
    audio.pause();
    audio.currentTime = 0;
  } catch(e) {}
}

// Try priming immediately and also on first user interaction
primeAudio();
document.addEventListener('click', primeAudio, {once: true});

function tickClock() {
  var n = new Date();
  document.getElementById('clock').textContent = n.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true});
  document.getElementById('dateStr').textContent = n.toLocaleDateString('en-IN', {weekday:'long', day:'numeric', month:'long'});
}
setInterval(tickClock, 1000);
tickClock();

function startCountdown() {
  clearInterval(countdownId);
  countdown = AUTO_MS / 1000;
  countdownId = setInterval(function() {
    countdown--;
    var m = Math.floor(countdown / 60);
    var s = countdown % 60;
    document.getElementById('nextRefresh').textContent = 'Auto-refresh in ' + m + ':' + String(s).padStart(2, '0');
    if (countdown <= 0) { clearInterval(countdownId); fetchData(); }
  }, 1000);
}

function confetti() {
  var cols = ['#16cf76','#185FA5','#FDC645','#f472b6','#a78bfa','#ffffff','#ff6b35','#00d2ff'];
  var wrapper = document.getElementById('page-wrapper');
  for (var i = 0; i < 80; i++) {
    var el = document.createElement('div');
    el.className = 'confetti-p';
    var size = 6 + Math.random() * 9;
    el.style.cssText = 'left:' + (Math.random()*100) + '%;top:0;width:' + size + 'px;height:' + size + 'px;background:' + cols[Math.floor(Math.random()*cols.length)] + ';border-radius:' + (Math.random()>.5?'50%':'2px') + ';animation-duration:' + (2+Math.random()*2.5) + 's;animation-delay:' + (Math.random()*0.5) + 's;';
    wrapper.appendChild(el);
    el.addEventListener('animationend', function() { if(this.parentNode) this.parentNode.removeChild(this); });
  }
}

function celebrate(ownerName, dest, amount, col) {
  var avEl = document.getElementById('celAvatar');
  var ini = initials(ownerName);
  avEl.style.background = col ? col.bg : '#16cf76';
  avEl.style.color = col ? col.txt : '#fff';
  avEl.textContent = ini;
  document.getElementById('celTitle').textContent = '🎉 ' + ownerName + ' just confirmed!';
  document.getElementById('celSub').textContent = dest || '';
  document.getElementById('celAmount').textContent = amount ? '₹' + fmtAmt(amount) : '';
  var ov = document.getElementById('cel-overlay');
  ov.classList.add('show');
  playSound();
  var times = [0,3000,6000,9500,13000,16500,20000,23500,27000,30500,34000,38000,42000];
  times.forEach(function(t) {
    if (t === 0) confetti();
    else setTimeout(confetti, t);
  });
  if (celTimerId) clearInterval(celTimerId);
  celCountdown = 45;
  document.getElementById('celTimer').textContent = 'Closing in 45s';
  celTimerId = setInterval(function() {
    celCountdown--;
    document.getElementById('celTimer').textContent = 'Closing in ' + celCountdown + 's';
    if (celCountdown <= 0) {
      clearInterval(celTimerId);
      document.getElementById('cel-overlay').classList.remove('show');
      stopSound();
    }
  }, 1000);
}

document.getElementById('cel-overlay').addEventListener('click', function() {
  clearInterval(celTimerId);
  this.classList.remove('show');
  stopSound();
});

document.getElementById('refreshBtn').addEventListener('click', function() { fetchData(); });
document.getElementById('testBtn').addEventListener('click', function() {
  celebrate('Test User', 'Test Destination', 100000, AV_COLOURS[1]);
});

function fmtAmt(v) { return Number(v).toLocaleString('en-IN', {maximumFractionDigits:0}); }
function fmtDate(s) {
  if (!s) return '—';
  var d = new Date(s);
  return isNaN(d) ? s : d.toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'2-digit'});
}
function fmtTime(s) {
  if (!s) return {time:'—', when:''};
  var d = new Date(s);
  if (isNaN(d)) return {time:s, when:''};
  var time = d.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', hour12:true});
  var today = new Date();
  var when = d.toDateString() === today.toDateString() ? 'Today' : d.toLocaleDateString('en-IN', {day:'numeric', month:'short'});
  return {time:time, when:when};
}
function isToday(s) {
  if (!s) return false;
  var d = new Date(s);
  var t = new Date();
  return d.getDate()===t.getDate() && d.getMonth()===t.getMonth() && d.getFullYear()===t.getFullYear();
}
function initials(name) { return (name||'?').split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2); }
function colourFor(id) {
  if (!colourMap[id]) { colourMap[id] = AV_COLOURS[colourIdx % AV_COLOURS.length]; colourIdx++; }
  return colourMap[id];
}
function monthRange() {
  var n = new Date();
  return {s: new Date(n.getFullYear(), n.getMonth(), 1), e: new Date(n.getFullYear(), n.getMonth()+1, 0, 23, 59, 59)};
}
function isGIT(rec) {
  var layout = rec['Layout'];
  if (!layout) return false;
  return (layout.name || layout.Name || '').toString().toUpperCase().includes('GIT');
}

function renderRow(rec, isNew) {
  var git = isGIT(rec);
  var dest_field = git ? 'Group_Depature' : 'Cities_to_be_covered';
  var owner = rec['Owner'] || {};
  var name = owner.name || '—';
  var destRaw = rec[dest_field];
  var dest = (destRaw && typeof destRaw === 'object' ? destRaw.name : destRaw) || '—';
  var amount = rec['Quote_Value'];
  var pax = rec['Total_Passanger_Travelling'] || '—';
  var td = fmtDate(rec['Travel_Date']);
  var ct = fmtTime(rec['Created_Time']);
  var col = colourFor(owner.id || name);
  var ini = initials(name);
  var showNew = isToday(rec['Created_Time']);

  return '<div class="row' + (isNew ? ' is-new' : '') + '" style="border-left-color:' + col.border + '">' +
    '<div class="av-fallback" style="background:' + col.bg + ';color:' + col.txt + ';border:2px solid ' + col.border + '">' + ini + '</div>' +
    '<div class="cell"><div class="c-name" style="color:' + col.txt + '">' + name + '</div>' +
    '<div>' + (showNew ? '<span class="new-tag">New</span>' : '') + (git ? '<span class="git-tag">GIT</span>' : '') + '</div></div>' +
    '<div class="cell"><div class="c-dest">📍 ' + dest + '</div></div>' +
    '<div class="cell"><div class="c-amount">₹' + (amount ? fmtAmt(amount) : '—') + '</div></div>' +
    '<div class="cell"><div class="c-pax">👥 ' + pax + '</div></div>' +
    '<div class="cell"><div class="c-tdate">✈️ ' + td + '</div></div>' +
    '<div class="cell c-time"><div class="c-time-main">' + ct.time + '</div><div class="c-time-date">' + ct.when + '</div></div>' +
    '</div>';
}

function fetchData() {
  var spin = document.getElementById('spinner');
  var msg = document.getElementById('footerMsg');
  spin.classList.add('on');
  msg.textContent = 'Refreshing...';
  fetch(PROXY)
    .then(function(res) { return res.json(); })
    .then(function(json) {
      var recs = json.data || [];
      var range = monthRange();
      var filtered = recs.filter(function(r) {
        var ct = r['Created_Time'];
        if (!ct) return false;
        var d = new Date(ct);
        if (d < range.s || d > range.e) return false;
        if (isGIT(r)) {
          var destRaw = r['Group_Depature'];
          var dest = destRaw && typeof destRaw === 'object' ? destRaw.name : destRaw;
          return dest && dest.toString().trim() !== '';
        } else {
          var tos = (r['Type_of_Service'] || '').toString().trim();
          return tos === 'International Holiday Package' || tos === 'Domestic Holiday Package';
        }
      });
      var newIds = filtered.filter(function(r) { return !knownIds.has(r.id); }).map(function(r) { return r.id; });
      var totAmt = filtered.reduce(function(a, r) { return a + (Number(r['Quote_Value']) || 0); }, 0);
      var totPax = filtered.reduce(function(a, r) { return a + (Number(r['Total_Passanger_Travelling']) || 0); }, 0);
      document.getElementById('sTotal').textContent = filtered.length || '—';
      document.getElementById('sValue').textContent = filtered.length ? '₹' + fmtAmt(totAmt) : '—';
      document.getElementById('sPax').textContent = totPax || '—';
      document.getElementById('sRefresh').textContent = new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', hour12:true});
      var feed = document.getElementById('feed');
      feed.innerHTML = filtered.length
        ? filtered.map(function(r) { return renderRow(r, newIds.indexOf(r.id) >= 0); }).join('')
        : '<div class="state-box"><div class="s-icon">📭</div><div>No confirmations this month yet.</div></div>';
      if (!firstLoad && newIds.length) {
        var n = filtered.find(function(r) { return r.id === newIds[0]; });
        if (n) {
          var git = isGIT(n);
          var owner = n['Owner'] || {};
          var col = colourFor(owner.id || owner.name);
          var destRaw = git ? n['Group_Depature'] : n['Cities_to_be_covered'];
          var destVal = destRaw && typeof destRaw === 'object' ? destRaw.name : destRaw;
          celebrate(owner.name || 'Someone', destVal, n['Quote_Value'], col);
        }
      }
      filtered.forEach(function(r) { knownIds.add(r.id); });
      firstLoad = false;
      msg.textContent = 'Showing ' + filtered.length + ' confirmation' + (filtered.length !== 1 ? 's' : '') + ' this month';
    })
    .catch(function(err) {
      document.getElementById('feed').innerHTML = '<div class="state-box"><div class="s-icon">⚠️</div><div>Error: ' + err.message + '</div></div>';
      document.getElementById('footerMsg').textContent = 'Error connecting to proxy';
    })
    .finally(function() {
      spin.classList.remove('on');
      startCountdown();
    });
}

fetchData();
</script>
</body>
</html>
